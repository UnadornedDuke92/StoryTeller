pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'StoryTeller'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
include ':react-viro', ':viro_renderer', ':gvr_common', ':arcore_client'
project(':arcore_client').projectDir = file('../node_modules/@reactvision/react-viro/android/arcore_client')
project(':gvr_common').projectDir = file('../node_modules/@reactvision/react-viro/android/gvr_common')
project(':react-viro').projectDir = file('../node_modules/@reactvision/react-viro/android/react_viro')
project(':viro_renderer').projectDir = file('../node_modules/@reactvision/react-viro/android/viro_renderer')
